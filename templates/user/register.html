{% extends 'base.html' %}
{% load static %}

{% block content %}
{% include 'components/_user_style.html' %}

<div class="auth-container">
    <div class="auth-bg-circle c1"></div>
    <div class="auth-bg-circle c2"></div>
    
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Yangi hisob yaratish</h1>
            <p class="auth-subtitle">ShopVerse tarmog'iga qo'shiling</p>
        </div>
        
        <form action="{% url 'login' %}" class="space-y-5" method="POST">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="first_name">Ism</label>
                    <input type="text" id="first_name" name="first_name" class="form-input" placeholder="Ali" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="last_name">Familiya</label>
                    <input type="text" id="last_name" name="last_name" class="form-input" placeholder="Valiyev" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="username">Foydalanuvchi nomi</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="ali_valiyev" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="password">Parol</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm_password">Parolni tasdiqlang</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="auth-btn">
                Ro'yxatdan o'tish <span style="font-size:1.2rem;">✨</span>
            </button>
        </form>
        
        <div class="auth-footer">
            Allaqachon hisobingiz bormi? <a href="{% url 'login' %}" class="auth-link">Kirish</a>
        </div>
    </div>
</div>

{% block footer %}
{% endblock footer %}
{% endblock content %}
