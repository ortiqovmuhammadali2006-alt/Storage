<section class="section" id="categories">
  <div class="section-header">
    <div>
      <h2 class="section-title">Barcha <span>Kategoriyalar</span></h2>
      <p class="section-subtitle">Kerakli bo'limni tanlang</p>
    </div>
  </div>

  <div class="category-grid">
    <a href="{% url 'home' %}">
      <button class="snap-start flex-shrink-0 flex flex-col items-center gap-3 glass-card rounded-2xl p-5 w-32 text-center {% if request.path == '/' %} border-primary-500 border-opacity-50 group bg-primary-500/10 {% endif %}">
        <div class="w-14 h-14 rounded-full bg-primary-500 flex items-center justify-center text-white text-2xl group-hover:scale-110 transition shadow-lg shadow-primary-500/40">
          <i class="fas fa-hamburger"></i>
        </div>
        <span class="font-bold text-white">Barchasi</span>
      </button>
    </a>
    {% for category in categories %}
    
    <a href="{% url 'category' category.slug %}" class="category-card">
      <span class="category-icon"> {{ category.stickers.name }} </span>
      <div class="category-name">{{ category.name }}</div>
    </a>
    {% endfor %}
  </div>
</section>
