<section class="section" id="categories">
  <div class="section-header">
    <div>
      <h2 class="section-title">Barcha <span>Kategoriyalar</span></h2>
      <p class="section-subtitle">Kerakli bo'limni tanlang</p>
    </div>
  </div>

  <div class="category-grid">
    
    <!-- Barchasi -->
    <a href="{% url 'home' %}" class="category-card {% if request.path == '/' %} active {% endif %}">
      <span class="category-icon"> 🛍️ </span>
      <div class="category-name">Barchasi</div>
    </a>

    
    {% for category in categories %}
    <a href="{% url 'category' category.slug %}" class="category-card">
      <span class="category-icon">
        {{ category.get_icon }}
      </span>
      <div class="category-name">{{ category.name }}</div>
    </a>
    {% endfor %}

  </div>
</section>
